openapi: 3.0.3
info:
  title: Zenziya Onboarding API
  description: |
    Introducción al Ecosistema de Onboarding

    📄 Documento funcional:
    [Ver documento](https://docs.google.com/document/d/1BRZbFu0P25ZCTOkEyILTLDEIxTnRH_18rP8qx-_Plr4/edit?tab=t.r7bacs46nixe)
  version: 2.0.0

servers:
  - url: https://apiv1.dev.zenziya.com

tags:
  - name: Lead
  - name: Application
  - name: Offer
  - name: Simulation
  - name: Product
  - name: KYC
  - name: Bank
  - name: Referrals
  - name: IMEI_LOCK
  - name: Contract
  - name: Checkout

paths:

  /customer/cedula/{cedula}/country/{country_code}:
    get:
      tags: [Lead]
      summary: Obtener UUID del cliente
      parameters:
        - name: cedula
          in: path
          required: true
          schema:
            type: string
        - name: country_code
          in: path
          required: true
          schema:
            type: string
            example: DO
      responses:
        "200":
          description: UUID obtenido
          content:
            application/json:
              schema:
                type: object
                properties:
                  person_uuid:
                    type: string
        "400":
          description: Cédula inválida
        "401":
          description: Cliente no apto
        "404":
          description: No encontrado
        "500":
          description: Blacklist / error interno

  /customer/{customer_uuid}/general_status:
    get:
      tags: [Application]
      summary: Obtener estado general del cliente
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estado del workflow
        "400":
          description: UUID inválido
        "404":
          description: Sin solicitud activa
        "500":
          description: Error interno

  /customer/{customer_uuid}/application/offer:
    get:
      tags: [Offer]
      summary: Obtener oferta pre-aprobada
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Oferta disponible
          content:
            application/json:
              schema:
                type: object
                properties:
                  max_amount:
                    type: number
                  min_amount:
                    type: number
                  max_installments:
                    type: integer
                  min_installments:
                    type: integer
                  tna:
                    type: number
        "404":
          description: Sin oferta vigente
        "500":
          description: Error interno

  /customer/{customer_uuid}/application/offer/simulation:
    get:
      tags: [Simulation]
      summary: Simular préstamo
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
        - name: amount
          in: query
          required: true
          schema:
            type: number
        - name: installments
          in: query
          required: true
          schema:
            type: integer
        - name: frequency
          in: query
          schema:
            type: string
            enum: [monthly, biweekly]
        - name: first_due_date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Plan de pagos
        "400":
          description: Parámetros inválidos
        "422":
          description: Límites comerciales excedidos
        "404":
          description: Sin oferta
        "500":
          description: Error de cálculo

  /customer/{customer_uuid}/application/product:
    post:
      tags: [Product]
      summary: Seleccionar producto
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, installments, frequency, first_due_date]
              properties:
                amount:
                  type: number
                installments:
                  type: integer
                frequency:
                  type: string
                  enum: [monthly, biweekly]
                first_due_date:
                  type: string
                  format: date
      responses:
        "200":
          description: Producto registrado
        "400":
          description: Error de validación o contrato firmado
        "500":
          description: Error interno

  /customer/{customer_uuid}/onboarding/kyc:
    post:
      tags: [KYC]
      summary: Iniciar KYC
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [callback_url]
              properties:
                callback_url:
                  type: string
      responses:
        "200":
          description: Link KYC generado
        "400":
          description: Error de validación
        "500":
          description: Error proveedor

  /bank/:
    get:
      tags: [Bank]
      summary: Obtener listado de bancos
      responses:
        "200":
          description: Lista de bancos

  /customer/{customer_uuid}/bank_account:
    post:
      tags: [Bank]
      summary: Registrar cuenta bancaria
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bank_id, account_number, account_type]
              properties:
                bank_id:
                  type: integer
                account_number:
                  type: string
                account_type:
                  type: string
                  enum: [CC, CA]
      responses:
        "200":
          description: Cuenta registrada
        "400":
          description: Error validación
        "500":
          description: Error interno

  /customer/{customer_uuid}/application/referrals:
    post:
      tags: [Referrals]
      summary: Registrar referidos
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                referrals:
                  type: array
                  items:
                    type: object
                    required: [full_name, phone]
                    properties:
                      full_name:
                        type: string
                      phone:
                        type: string
                      email:
                        type: string
      responses:
        "200":
          description: Referidos registrados
        "400":
          description: Error validación
        "500":
          description: Error interno

  /customer/{customer_uuid}/application/imei_lock:
    post:
      tags: [IMEI_LOCK]
      summary: Registrar IMEI
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imeis, federated]
              properties:
                imeis:
                  type: array
                  items:
                    type: string
                federated:
                  type: boolean
      responses:
        "200":
          description: IMEI registrado
        "400":
          description: Error validación
        "409":
          description: IMEI en conflicto
        "500":
          description: Error interno

  /customer/{customer_uuid}/sign:
    post:
      tags: [Contract]
      summary: Generar contrato
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                callback_url:
                  type: string
                force_creation:
                  type: boolean
      responses:
        "200":
          description: URL de firma generada
        "400":
          description: Error de negocio
        "500":
          description: Error proveedor

  /customer/{customer_uuid}/application/checkout:
    post:
      tags: [Checkout]
      summary: Formalizar crédito
      parameters:
        - name: customer_uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
      responses:
        "200":
          description: Proceso completado
        "400":
          description: Pasos incompletos
        "500":
          description: Error interno
