<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API de Orquestación de Crédito - FLEX</title>
    
    <!-- Swagger UI Styles -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.9.0/favicon-32x32.png" sizes="32x32" />
    
    <!-- Mermaid Styles -->
    <style>
        /* Custom Styles for Swagger UI */
        .swagger-ui .topbar {
            background-color: #1a1a2e;
        }
        
        .swagger-ui .topbar .download-url-wrapper input[type=text] {
            border: 2px solid #4a90d9;
        }
        
        .swagger-ui .topbar .download-url-wrapper .download-url-button {
            background-color: #4a90d9;
        }
        
        .swagger-ui .info .title {
            color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .swagger-ui .info .description {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        
        /* Mermaid Diagram Container */
        .mermaid-container {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 20px;
            margin: 20px 0;
            overflow-x: auto;
        }
        
        .mermaid-container h4 {
            color: #1a1a2e;
            margin-top: 0;
            margin-bottom: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .mermaid {
            display: flex;
            justify-content: center;
        }
        
        /* Flow Diagram Container */
        .flow-diagram {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
            color: white;
        }
        
        .flow-diagram h3 {
            margin-top: 0;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .mermaid-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Swagger UI Container -->
    <div id="swagger-ui"></div>
    
    <!-- Swagger UI Bundle -->
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    
    <!-- Mermaid JS -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    
    <!-- Initialize Swagger UI and Mermaid -->
    <script>
        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: true,
            theme: 'default',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            },
            sequence: {
                useMaxWidth: true,
                diagramMarginX: 50,
                diagramMarginY: 10,
                actorMargin: 50,
                width: 150,
                height: 65,
                boxMargin: 10,
                boxTextMargin: 5,
                noteMargin: 10,
                messageMargin: 35,
                messageAlign: 'center'
            }
        });
        
        // Wait for DOM to be ready
        window.onload = function() {
            // Initialize Swagger UI
            const ui = SwaggerUIBundle({
                url: "swagger-FLEX.yaml",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                validatorUrl: null,
                docExpansion: "list",
                filter: true,
                showExtensions: true,
                showCommonExtensions: true,
                defaultModelsExpandDepth: 2,
                defaultModelExpandDepth: 2,
                onComplete: function() {
                    console.log('Swagger UI loaded successfully');
                    // Re-render Mermaid diagrams after Swagger UI completes
                    setTimeout(() => {
                        mermaid.init();
                    }, 500);
                },
                requestInterceptor: function(request) {
                    // Add custom headers if needed
                    // request.headers['Authorization'] = 'Bearer YOUR_TOKEN';
                    return request;
                },
                responseInterceptor: function(response) {
                    return response;
                }
            });
            
            // Store UI instance globally
            window.ui = ui;
            
            // Add custom information panel
            addInfoPanel();
        };
        
        // Add Custom Info Panel with Flow Diagram
        function addInfoPanel() {
            const infoPanel = document.createElement('div');
            infoPanel.innerHTML = `
                <div class="flow-diagram">
                    <h3>🔄 Flujo Onboarding</h3>
                    
                    <div class="mermaid-container">
                        <div class="mermaid">
sequenceDiagram
    autonumber
    participant AG as Agente CRM
    participant API as API Gateway Zenziya
    participant CDB as Customer DB
    participant INC as Incode (KYC)
    participant VF as ViaFirma (Contrato)
    participant CORE as Core Bancario
    
    AG->>API: GET https://{{apiv1_domain}}/customer/cedula/{{cedula}}/country/{{country_code}}
    API->>CDB: Validar Cédula y Riesgo
    CDB-->>API: person_uuid o Error 401/404/500
    API-->>AG: UUID o Mensaje de Error
    
    AG->>API: GET https://{{apiv1_domain}}/customer/{{customer_uuid}}/general_status
    API->>CDB: Obtener Steps y next_step
    CDB-->>API: Array de steps + estado
    API-->>AG: Estado del Workflow
    
    AG->>API: GET https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/offer
    API->>CDB: Obtener oferta pre-aprobada
    CDB-->>API: max_amount, min_amount, TNA, cuotas
    API-->>AG: Oferta Comercial
    
    AG->>API: GET https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/offer/simulation
    API->>CORE: Calcular plan de pagos
    CORE-->>API: Tabla de amortización
    API-->>AG: Plan de Pagos Detallado
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/product
    API->>CDB: Guardar selección de producto
    CDB-->>API: selected_amount, fees, principal
    API-->>AG: Confirmación Product Selection
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/onboarding/kyc
    API->>INC: Generar sesión biométrica
    INC-->>API: kyc_url
    API-->>AG: Link para cliente
    
    Note over AG,INC: Cliente completa biometría
    
    INC->>API: Webhook - Resultado KYC
    API->>CDB: Actualizar estado KYC
    CDB-->>API: Success/DoRetry
    
    AG->>API: GET https://{{apiv1_domain}}/bank/
    API-->>AG: Catálogo de Bancos
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/bank_account
    API->>CDB: Validar y guardar cuenta
    CDB-->>API: bank_account_id
    API-->>AG: Cuenta Registrada
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/referrals
    API->>CDB: Guardar referidos
    CDB-->>API: Status OK
    API-->>AG: Referidos Guardados
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/imei_lock
    API->>CORE: Registrar dispositivo Samsung Knox
    CORE-->>API: IMEI bloqueado
    API-->>AG: Garantía Registrada
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/sign
    API->>VF: Generar contrato y sesión
    VF-->>API: sign_url, signature_id
    API-->>AG: Link de Firma
    
    Note over AG,VF: Cliente firma contrato
    
    VF->>API: Webhook - Firma Completada
    API->>CDB: is_contract_signed = true
    CDB-->>API: ACCEPTED
    
    AG->>API: POST https://{{apiv1_domain}}/customer/{{customer_uuid}}/application/checkout
    API->>CDB: Validar todos los pasos SUCCESS
    CDB-->>API: PENDING_DISBURSEMENT
    API-->>AG: Formalización Exitosa
                        </div>
                    </div>
                </div>
            `;
            
            // Insert before swagger-ui
            const swaggerUi = document.getElementById('swagger-ui');
            swaggerUi.parentNode.insertBefore(infoPanel, swaggerUi);
        }
        
        // Add keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl+K or Cmd+K to focus search
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                const searchInput = document.querySelector('.swagger-ui .filter-container input');
                if (searchInput) {
                    searchInput.focus();
                }
            }
            
            // Ctrl+R or Cmd+R to refresh
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                window.ui.specActions.download();
            }
        });
    </script>
</body>
</html>
